<!doctype html>
<meta charset="utf-8">
<title>Influradar — Influencer sourcing built for Israeli brands</title>
<style>html,body{background:#0b0d10;margin:0}</style>
<link rel="preload" href="../styles.css" as="style">
<script>
  // Niche landing stub — keeps /food/ in the URL bar, loads the canonical brand
  // landing page, then re-points the demo CTAs at the food niche demo.
  fetch("../brand/index.html").then(r => r.text()).then(html => {
    html = html
      .replace("<head>", '<head><style>html{visibility:hidden}</style><base href="../brand/">')
      .replace(/href="app\.html"/g, 'href="../food/demo/"')
      .replace(/href="index\.html"/g, 'href="../food/"');
    document.open(); document.write(html); document.close();
  });
</script>
